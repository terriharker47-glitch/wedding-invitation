<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Cormorant+Garamond&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #ffffff;
            color: #003d5b;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3em;
            color: #c24f4f;
            animation: fadeIn 2s;
        }
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
        .invitation {
            border: 5px solid #003d5b;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin: 20px auto;
            background: url('Images/Image9.jpg') no-repeat center;
            background-size: cover;
            color: white;
        }
        .details {
            margin-top: 20px;
            background: rgba(0, 61, 91, 0.7);
            padding: 15px;
            border-radius: 10px;
        }
        img { 
            width: 200px;
            height: auto;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="invitation">
        <h1>You’re Invited to Our Wedding!</h1>
        <div class="details">
            <p>Ceremony details:</p>
            <p>October 3rd, 2026</p>
            <p>Riverside Estates, Hout Bay, Cape Town</p>
            <p>RSVP by September 1st to <a href="mailto:hello@terriandnathanael.com">hello@terriandnathanael.com</a></p>
        </div>
        <div class="images">
            <img src="Images/Image5.jpg" alt="Terri and Nathanael 1">
            <img src="Images/Image6.jpg" alt="Terri and Nathanael 2">
            <img src="Images/Image7.jpg" alt="Terri and Nathanael 3">
        </div>
    </div>
</body>
</html>
